<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To'lov Sahifasi — StreamVibe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            font-family: sans-serif;
        }

        .payment-box {
            background: #111217;
            padding: 45px 40px;
            width: 420px;
            position: relative;
            border-radius: 20px;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
        }

        .payment-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, #f3e5ab, #4a4022, #111217, #f3e5ab);
            animation: rotateGoldBorder 4s linear infinite;
            z-index: -2;
        }

        .payment-box::after {
            content: '';
            position: absolute;
            background: #111217;
            inset: 2px;
            border-radius: 18px;
            z-index: -1;
        }

        @keyframes rotateGoldBorder {
            100% { transform: rotate(360deg); }
        }

        h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f3e5ab;
            text-shadow: 0 0 10px rgba(243, 229, 171, 0.2);
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 9px;
            font-size: 11px;
            color: #7a7e85;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: #171921;
            border: 1px solid #252836;
            border-radius: 8px;
            box-sizing: border-box;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f3e5ab;
            background: #1a1c26;
            box-shadow: 0 0 10px rgba(243, 229, 171, 0.15);
        }

        .card-row {
            display: flex;
            gap: 20px;
        }

        .divider {
            border: 0;
            border-top: 1px solid #252836;
            margin: 20px 0;
        }

        .btn-pay {
            width: 100%;
            background: linear-gradient(90deg, #c5a059, #f1e4c3, #d4af37);
            background-size: 200% auto;
            color: #090a0f;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
            border-radius: 8px;
            margin-top: 32px;
        }

        .btn-pay:hover {
            background: linear-gradient(90deg, #7c3aed, #8b5cf6);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
            transform: translateY(-1px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #7a7e85;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #f3e5ab;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="payment-box">
    <h2>Obuna uchun To'lov</h2>
    <form id="paymentForm">
        <div class="input-group">
            <label>To'liq Ismingiz</label>
            <input type="text" id="fullname" placeholder="Anvar Aliyev" required>
        </div>
        <div class="input-group">
            <label>Login (E-mail yoki Tel)</label>
            <input type="text" id="login" placeholder="anvar123 yoki +99890..." required>
        </div>

        <hr class="divider">

        <div class="input-group">
            <label>Karta Raqami</label>
            <input type="text" id="cardNumber" placeholder="8600 1234 5678 9012" maxlength="19" required>
        </div>

        <div class="card-row">
            <div class="input-group" style="flex: 2;">
                <label>Muddati (MM/YY)</label>
                <input type="text" id="cardExpiry" placeholder="12/29" maxlength="5" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>CVC/CVV</label>
                <input type="password" id="cardCvc" placeholder="123" maxlength="3" required>
            </div>
        </div>

        <button type="submit" class="btn-pay">Tasdiqlash va To'lash</button>
    </form>
    <a href="index.html" class="back-link">← Bosh sahifaga qaytish</a>
</div>

<script>
    document.getElementById('cardNumber').addEventListener('input', function(e) {
        e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    });

    document.getElementById('cardExpiry').addEventListener('input', function(e) {
        let val = e.target.value.replace(/[^\d]/g, '');
        if (val.length >= 3) val = val.slice(0, 2) + '/' + val.slice(2, 4);
        e.target.value = val;
    });

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const ism = document.getElementById('fullname').value;
        const login = document.getElementById('login').value;
        alert(`Rahmat, ${ism}! To'lovingiz muvaffaqiyatli qabul qilindi. Akkauntingiz (${login}) faollashtirildi!`);
        window.location.href = 'index.html';
    });
</script>

</body>
</html>
